<style>
  /* ---- Write-up-specific styles (not in style.css) ---- */
  .post-hero { max-width: 780px; margin: 0 auto; padding: 150px 24px 40px; }
  .post-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted, #888); text-decoration: none; font-size: 13px; margin-bottom: 28px;
  }
  .post-back:hover { color: var(--fg, #eaeaea); }
  .post-eyebrow {
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent, #7ee787); margin-bottom: 12px;
  }
  .post-title { font-size: clamp(28px, 4vw, 42px); line-height: 1.15; margin: 0 0 16px; }
  .post-meta { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted, #888); font-size: 13px; align-items: center; }
  .difficulty-badge {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border, #2a2a2a);
  }
  .difficulty-badge.easy { color: #7ee787; border-color: #7ee787; }
  .difficulty-badge.medium { color: #e3c567; border-color: #e3c567; }
  .difficulty-badge.hard { color: #e38b67; border-color: #e38b67; }
  .difficulty-badge.insane { color: #e36767; border-color: #e36767; }
  .post-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  .post-tags .tag {
    font-size: 11px; padding: 3px 9px; border: 1px solid var(--border, #2a2a2a);
    border-radius: 999px; color: var(--muted, #888);
  }
  .post-body {
    max-width: 780px; margin: 0 auto; padding: 0 24px 60px;
    font-size: 15.5px; line-height: 1.75; color: var(--fg, #e4e4e4);
  }
  .post-body p { margin: 0 0 22px; }
  .post-body h2 {
    font-size: 20px; margin: 40px 0 16px; padding-top: 8px;
    border-top: 1px solid var(--border, #2a2a2a);
  }
  .post-body code {
    font-family: 'JetBrains Mono', monospace; background: var(--code-bg, #161616);
    border: 1px solid var(--border, #2a2a2a); border-radius: 4px; padding: 2px 6px; font-size: 13.5px;
  }
  .code-block {
    margin: 0 0 28px; border: 1px solid var(--border, #2a2a2a); border-radius: var(--radius, 10px);
    background: var(--terminal-bg, #0d0d0d); overflow: hidden;
  }
  .code-block-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; border-bottom: 1px solid var(--border, #2a2a2a);
    font-size: 11.5px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted, #888);
  }
  .code-block-copy {
    background: transparent; border: 1px solid var(--border-hover, #333); color: var(--muted, #888);
    font-family: inherit; font-size: 11px; padding: 4px 9px; border-radius: 5px; cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .code-block-copy:hover { border-color: var(--accent, #7ee787); color: var(--text, #eaeaea); }
  .code-block pre {
    margin: 0; padding: 20px; overflow-x: auto; overflow-y: hidden;
  }
  .code-block pre code {
    display: block; background: none; border: none; padding: 0; font-size: 13px; line-height: 1.65;
    color: var(--text, #eaeaea); white-space: pre; tab-size: 4;
  }
  .post-outro {
    max-width: 780px; margin: 0 auto; padding: 0 24px 60px;
    font-size: 15.5px; line-height: 1.75; color: var(--muted, #aaa); font-style: italic;
    border-top: 1px solid var(--border, #2a2a2a); padding-top: 28px;
  }
  .post-nav {
    max-width: 780px; margin: 0 auto; padding: 0 24px 80px;
    display: flex; justify-content: space-between; gap: 16px;
  }
  .post-nav a {
    flex: 1; color: var(--muted, #888); text-decoration: none; font-size: 13px;
    padding: 14px 16px; border: 1px solid var(--border, #2a2a2a); border-radius: 8px;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .post-nav a:hover { border-color: var(--accent, #7ee787); color: var(--fg, #eaeaea); }
  .post-nav .next { text-align: right; }
  .post-nav .nav-label {
    display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 4px; opacity: 0.7;
  }
  .post-nav .spacer { visibility: hidden; }
  .post-not-found { max-width: 780px; margin: 0 auto; padding: 160px 24px 100px; text-align: center; }
</style>

<script src="js/script.js"></script>
<script>
  (async function(){
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('writeup');
    const post = slug && window.writeups ? window.writeups[slug] : null;
    const root = document.getElementById('post-root');

    if(!post){
      root.innerHTML = `
        <div class="post-not-found">
          <h1 class="post-title">Write-up not found</h1>
          <p style="color:var(--muted,#888);margin:16px 0 28px;">
            No write-up matches "${slug || ''}". It may have been moved or the link is out of date.
          </p>
          <a href="writeups.html" class="post-back">&larr; back to write-ups</a>
        </div>`;
      return;
    }

    document.getElementById('page-title').textContent = post.title + ' :: evelyn@portfolio';
    document.getElementById('page-description').setAttribute('content', post.intro.replace(/\s+/g, ' ').trim().slice(0, 155));

    function dedent(text) {
      text = text.replace(/^\n/, "");

      const lines = text.split("\n");

      const indents = lines
        .filter(line => line.trim().length)
        .map(line => line.match(/^ */)[0].length);

      const minIndent = Math.min(...indents);

      return lines
        .map(line => line.slice(minIndent))
        .join("\n")
        .trimEnd();
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Optional per-section code block: sections can include `code` (the snippet)
    // and `lang` (a short label like "python" or "bash") to render a
    // terminal-style block with a copy button beneath the section's prose.
    function codeBlockHTML(s){
      if(!s.code) return '';
      const lang = s.lang || 'code';
      return `
        <div class="code-block">
          <div class="code-block-head">
            <span>${escapeHtml(lang)}</span>
            <button type="button" class="code-block-copy">copy</button>
          </div>
          <pre><code>${escapeHtml(dedent(s.code))}</code></pre>
        </div>`;
    }

    const tagsHTML = (post.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    const sectionsHTML = await Promise.all(
    (post.sections || []).map(async (s) => {

        let code = '';

        if (s.codeFile) {
            const res = await fetch(s.codeFile);
            code = await res.text();
        } else if (s.code) {
            code = s.code;
        }

        return `
            ${s.heading ? `<h2>${s.heading}</h2>` : ''}
            <p>${s.body}</p>
            ${
                code
                    ? codeBlockHTML({
                        code,
                        lang: s.lang
                    })
                    : ''
            }
        `;
    })
);

    // prev/next based on shared ordering in writeup_data.js
    const order = window.writeupOrder || Object.keys(window.writeups);
    const idx = order.indexOf(slug);
    const prevSlug = idx > 0 ? order[idx - 1] : null;
    const nextSlug = idx >= 0 && idx < order.length - 1 ? order[idx + 1] : null;

    const metaBits = [
      post.date,
      post.read + ' read',
      post.platform || null,
      post.points != null ? post.points + ' pts' : null
    ].filter(Boolean);

    const metaHTML = metaBits
      .map(bit => `<span>${bit}</span>`)
      .join('<span>&middot;</span>');

    const difficultyHTML = post.difficulty
      ? `<span class="difficulty-badge ${post.difficulty}">${post.difficulty}</span>`
      : '';

    root.innerHTML = `
      <div class="post-hero">
        <a href="writeups.html" class="post-back">&larr; back to write-ups</a>
        <div class="post-eyebrow">${post.category ? post.category + ' &middot; ' : ''}CTF Write-up</div>
        <h1 class="post-title">${post.title}</h1>
        <div class="post-meta">${metaHTML}${difficultyHTML ? `<span>&middot;</span>${difficultyHTML}` : ''}</div>
        <div class="post-tags">${tagsHTML}</div>
      </div>

      <div class="post-body">
        <p>${post.intro}</p>
        ${sectionsHTML.join('')}
      </div>

      <div class="post-outro">${post.outro}</div>

      <nav class="post-nav" aria-label="Write-up navigation">
        ${prevSlug
          ? `<a href="writeup-post.html?writeup=${prevSlug}" class="prev"><span class="nav-label">&larr; previous</span>${window.writeups[prevSlug].title}</a>`
          : `<span class="spacer"></span>`}
        ${nextSlug
          ? `<a href="writeup-post.html?writeup=${nextSlug}" class="next"><span class="nav-label">next &rarr;</span>${window.writeups[nextSlug].title}</a>`
          : `<span class="spacer"></span>`}
      </nav>
    `;

    // Copy-to-clipboard for any code blocks in this write-up
    root.querySelectorAll('.code-block-copy').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.closest('.code-block').querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => {
          const original = btn.textContent;
          btn.textContent = 'copied';
          setTimeout(() => { btn.textContent = original; }, 1500);
        });
      });
    });
  })();
</script>
