<script>

    try{
      if(localStorage.getItem('theme') === 'light'){
        document.documentElement.setAttribute('data-theme','light');

<style>
  /* ---- Project-page-specific styles (not in style.css) ---- */
  .project-hero { max-width: 780px; margin: 0 auto; padding: 150px 24px 0; }
  .project-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 13px; margin-bottom: 28px;
  }
  .project-back:hover { color: var(--text); }
  .project-eyebrow {
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px;
  }
  .project-title { font-size: clamp(28px, 4vw, 42px); line-height: 1.15; margin: 0 0 16px; }
  .project-meta { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 13px; align-items: center; }
  .project-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  .project-tags .tag {
    font-size: 11px; padding: 3px 9px; border: 1px solid var(--border);
    border-radius: 999px; color: var(--muted);
  }
  .project-cover {
    max-width: 780px; margin: 36px auto 0; padding: 0 24px;
  }
  .project-cover img {
    width: 100%; display: block; border-radius: var(--radius-lg);
    border: 1px solid var(--border); background: var(--bg-raised);
  }
  .project-cover-placeholder {
    width: 100%; aspect-ratio: 16 / 8; border-radius: var(--radius-lg);
    border: 1px solid var(--border); background: var(--bg-raised);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted-dim); font-size: 13px;
  }
  .project-body {
    max-width: 780px; margin: 0 auto; padding: 40px 24px 20px;
    font-size: 15.5px; line-height: 1.75; color: var(--text);
  }
  .project-body p { margin: 0 0 22px; }
  .project-cta {
    max-width: 780px; margin: 0 auto; padding: 0 24px 60px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .project-nav {
    max-width: 780px; margin: 0 auto; padding: 0 24px 80px;
    display: flex; justify-content: space-between; gap: 16px;
  }
  .project-nav a {
    flex: 1; color: var(--muted); text-decoration: none; font-size: 13px;
    padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .project-nav a:hover { border-color: var(--accent); color: var(--text); }
  .project-nav .next { text-align: right; }
  .project-nav .nav-label {
    display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 4px; opacity: 0.7;
  }
  .project-nav .spacer { visibility: hidden; }
  .project-not-found { max-width: 780px; margin: 0 auto; padding: 160px 24px 100px; text-align: center; }
</style>
</head>

<script src="js/script.js"></script>
<script>
  (function(){
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('project');
    const post = slug && window.projectPosts ? window.projectPosts[slug] : null;
    const root = document.getElementById('project-root');

    if(!post){
      root.innerHTML = `
        <div class="project-not-found">
          <h1 class="project-title">Project not found</h1>
          <p style="color:var(--muted);margin:16px 0 28px;">
            No project matches "${slug || ''}". It may have been renamed or the link is out of date.
          </p>
          <a href="index.html#projects" class="project-back">&larr; back to projects</a>
        </div>`;
      return;
    }

    document.getElementById('page-title').textContent = post.title + ' :: evelyn@portfolio';
    document.getElementById('page-description').setAttribute('content', (post.short || '').replace(/\s+/g, ' ').trim().slice(0, 155));

    const tagsHTML = (post.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

    // Full description: split on blank lines into paragraphs
    const paragraphs = (post.description || post.short || '')
      .split(/\n\s*\n/)
      .map(p => `<p>${p.trim()}</p>`)
      .join('');

    const coverHTML = post.image
      ? `<div class="project-cover"><img src="${post.image}" alt="${post.title} cover image"></div>`
      : `<div class="project-cover"><div class="project-cover-placeholder">no cover image set for this project yet</div></div>`;

    const githubHTML = post.github
      ? `<a href="${post.github}" target="_blank" rel="noopener" class="btn btn-solid">view on github</a>`
      : '';

    // prev/next based on shared ordering in project_data.js
    const order = window.projectPostOrder || Object.keys(window.projectPosts);
    const idx = order.indexOf(slug);
    const prevSlug = idx > 0 ? order[idx - 1] : null;
    const nextSlug = idx >= 0 && idx < order.length - 1 ? order[idx + 1] : null;

    root.innerHTML = `
      <div class="project-hero">
        <a href="index.html#projects" class="project-back">&larr; back to projects</a>
        <div class="project-eyebrow">Selected Work</div>
        <h1 class="project-title">${post.title}</h1>
        <div class="project-meta">
          <span>${post.date || ''}</span>
        </div>
        <div class="project-tags">${tagsHTML}</div>
      </div>

      ${coverHTML}

      <div class="project-body">
        ${paragraphs}
      </div>

      <div class="project-cta">${githubHTML}</div>

      <nav class="project-nav" aria-label="Project navigation">
        ${prevSlug
          ? `<a href="project-post.html?project=${prevSlug}" class="prev"><span class="nav-label">&larr; previous</span>${window.projectPosts[prevSlug].title}</a>`
          : `<span class="spacer"></span>`}
        ${nextSlug
          ? `<a href="project-post.html?project=${nextSlug}" class="next"><span class="nav-label">next &rarr;</span>${window.projectPosts[nextSlug].title}</a>`
          : `<span class="spacer"></span>`}
      </nav>
    `;
  })();
</script>
